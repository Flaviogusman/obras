<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Gestão de Obras</title>

<!-- ============================================================
     LIBS EXTERNAS (via CDN, sem instalação / sem build)
     - Chart.js: gráficos
     - chartjs-plugin-datalabels: rótulos dentro/acima das barras e roscas
     - jsPDF + html2canvas: exportação em PDF
     ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- xlsx (SheetJS): lê o arquivo .xlsx binário direto no navegador, sem backend -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==============================================================
   DESIGN TOKENS — paleta executiva de BI (fundo claro, acentos
   em azul-aço / teal / âmbar, tipografia forte Manrope + Inter)
   ============================================================== */
:root{
  --bg:            #F4F6F9;
  --surface:       #FFFFFF;
  --surface-2:     #FBFCFE;
  --ink:           #0F172A;
  --ink-soft:      #47526B;
  --muted:         #8592AC;
  --border:        #E3E8F0;
  --border-strong: #C7D0E0;

  --navy:          #0F1F3D;
  --steel:         #2A5CDB;
  --steel-soft:    #EAF0FE;
  --teal:          #0EA5A0;
  --teal-soft:     #E4F7F5;
  --amber:         #F0A50B;
  --amber-soft:    #FDF2DD;
  --rose:          #E23A5E;
  --rose-soft:     #FCE7EC;
  --violet:        #7C5CFC;

  --shadow-sm: 0 1px 2px rgba(15,31,61,.05), 0 1px 1px rgba(15,31,61,.04);
  --shadow-md: 0 10px 30px -12px rgba(15,31,61,.18);
  --radius: 16px;
  --radius-sm: 10px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Manrope',system-ui,sans-serif;}

/* ---------- App shell ---------- */
.app{max-width:1440px;margin:0 auto;padding:28px 28px 80px;}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:24px;flex-wrap:wrap;margin-bottom:22px;
}
.brand-eyebrow{
  font-size:11px;letter-spacing:.14em;font-weight:700;color:var(--steel);
  text-transform:uppercase;margin:0 0 6px;
}
.brand-title{
  font-size:28px;font-weight:800;color:var(--navy);margin:0 0 4px;line-height:1.15;
}
.brand-sub{font-size:13.5px;color:var(--ink-soft);margin:0;}
.topbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--ink);font-weight:600;font-size:13.5px;
  cursor:pointer;transition:.15s ease;font-family:inherit;
}
.btn:hover{border-color:var(--steel);color:var(--steel);box-shadow:var(--shadow-sm);}
.btn-primary{background:var(--navy);border-color:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--steel);border-color:var(--steel);color:#fff;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn svg{width:15px;height:15px;flex:none;}

.meta-row{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
  margin-bottom:22px;padding:10px 16px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:12px;font-size:12.5px;color:var(--ink-soft);
}
.meta-row b{color:var(--navy);}
#statusPill{display:inline-flex;align-items:center;gap:6px;font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
.dot.err{background:var(--rose);}
.dot.loading{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ---------- Tabs (Abas) ---------- */
.tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--border);}
.tab-btn{
  padding:12px 20px;font-weight:700;font-size:14px;color:var(--muted);
  background:transparent;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:'Manrope',sans-serif;transition:.15s;
}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--steel);}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- Section headers ---------- */
.section{margin-bottom:28px;}
.section-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.section-num{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:12px;color:var(--steel);
  background:var(--steel-soft);padding:3px 9px;border-radius:20px;letter-spacing:.02em;
}
.section-title{font-size:16.5px;font-weight:800;color:var(--navy);margin:0;letter-spacing:-.01em;}

/* ---------- Grid / Cards ---------- */
.grid{display:grid;gap:18px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-12{grid-template-columns:repeat(12,1fr);}
.span-4{grid-column:span 4;}
.span-6{grid-column:span 6;}
.span-8{grid-column:span 8;}
.span-12{grid-column:span 12;}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 22px;box-shadow:var(--shadow-sm);
}
.card-title{
  font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
  letter-spacing:.06em;margin:0 0 14px;
}
.chart-box{position:relative;width:100%;}
.chart-box.h-220{height:220px;}
.chart-box.h-280{height:280px;}
.chart-box.h-320{height:320px;}
.chart-box.h-380{height:380px;}
.chart-box.h-tall{height:560px;}

/* ---------- KPI cards ---------- */
.kpi{
  background:linear-gradient(155deg,var(--surface) 0%,var(--surface-2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;
  display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-sm);
}
.kpi-label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;}
.kpi-value{font-size:30px;font-weight:800;font-family:'Manrope',sans-serif;color:var(--navy);}
.kpi-value.pos{color:var(--teal);}
.kpi-value.neg{color:var(--rose);}
.kpi-sub{font-size:12px;color:var(--muted);}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1.5px solid var(--border-strong);}
table.data-table{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--surface);}
table.data-table th{
  background:var(--navy);color:#fff;font-weight:700;text-align:left;padding:11px 14px;
  font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
}
table.data-table td{
  padding:11px 14px;border:1.5px solid var(--border-strong);color:var(--ink);font-weight:500;
}
table.data-table tr:nth-child(even) td{background:var(--surface-2);}
table.data-table td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
table.data-table td.merged-label{background:var(--steel-soft)!important;font-weight:700;color:var(--navy);}

/* ---------- Filters / explorer ---------- */
.filter-bar{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;
}
.filter-field{display:flex;flex-direction:column;gap:4px;min-width:180px;}
.filter-field label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
select.filter-select{
  padding:9px 12px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;
  font-family:inherit;font-size:13.5px;color:var(--ink);font-weight:600;cursor:pointer;
}

/* ---------- Notices ---------- */
.notice{
  border:1px dashed var(--border-strong);background:var(--amber-soft);border-radius:var(--radius-sm);
  padding:14px 16px;font-size:13px;color:#7A5306;display:flex;gap:10px;align-items:flex-start;
}
.notice.err{background:var(--rose-soft);color:#8C1D3B;border-color:var(--rose);}
.notice svg{flex:none;width:18px;height:18px;margin-top:1px;}

.empty-state{
  padding:40px 20px;text-align:center;color:var(--muted);font-size:13.5px;
  border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);background:var(--surface-2);
}

footer.appfoot{margin-top:40px;text-align:center;color:var(--muted);font-size:12px;}

@media(max-width:1080px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .span-4,.span-6,.span-8{grid-column:span 12;}
}
@media print{
  .topbar-actions,.btn,.tabs{display:none!important;}
}
</style>
</head>
<body>

<div class="app" id="appRoot">

  <!-- ============================================================
       CABEÇALHO
       ============================================================ -->
  <div class="topbar">
    <div>
      <p class="brand-eyebrow" data-i18n="eyebrow">Business Intelligence · Construção Civil</p>
      <h1 class="brand-title" id="dashTitle">DASHBOARD DO ASSUNTO: SABARÁ PLATZ</h1>
      <p class="brand-sub" id="dashSubtitle" data-i18n="subtitle">Acompanhamento executivo de prazos, custos, produção e suprimentos</p>
    </div>
    <div class="topbar-actions">

      <button class="btn" id="btnPdf" onclick="exportPdf()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>

  <div class="meta-row">

    <span><span data-i18n="lastUpdate">Última atualização:</span> <b id="lastUpdateTime">—</b></span>
  </div>

       ABAS (TABS)
       ============================================================ -->

    <button class="tab-btn active" data-tab="aba1" onclick="switchTab('aba1')" id="tabBtnAba1">Aba 01</button>
    <button class="tab-btn" data-tab="aba2" onclick="switchTab('aba2')" id="tabBtnAba2">Aba 02</button>

  <footer class="appfoot" data-i18n="footer">Dashboard gerado automaticamente a partir da planilha de origem · Uso interno de gestão de obras</footer>
</div>

<script>
/* ==================================================================
   ================  CONFIGURAÇÃO DE FONTE DE DADOS  ================

   FONTE: arquivo .xlsx único, com 2 abas (planilhas internas), lido
   diretamente no navegador via SheetJS (sem backend).

   ⚠️ LIMITAÇÃO TÉCNICA IMPORTANTE — LEIA ANTES DE PUBLICAR NO GITHUB:
   O link do SharePoint informado é um link de VISUALIZAÇÃO
   (sharepoint.com/:x:/g/personal/...), não um endpoint de download
   direto. Ele normalmente exige login da conta Microsoft e, mesmo
   quando compartilhado como "qualquer pessoa com o link", o SharePoint
   não libera cabeçalhos CORS para domínios externos (como
   flaviogusman.github.io). Ou seja: um fetch() feito a partir do
   GitHub Pages para esse link tende a falhar por CORS/autenticação —
   isso não é uma limitação do código, é uma restrição do próprio
   SharePoint. Este dashboard trata esse cenário com uma mensagem de
   erro amigável (não quebra a página), mas para funcionar de forma
   confiável em produção há 2 caminhos:

   OPÇÃO A (recomendada) — Hospedar o .xlsx dentro do próprio
   repositório GitHub (ex.: /data/obra.xlsx) e referenciar por caminho
   relativo. Isso elimina CORS porque o arquivo passa a ser do mesmo
   domínio do GitHub Pages. Basta atualizar o .xlsx no repositório
   sempre que a planilha original mudar (manual, ou via um Action que
   sincronize periodicamente).

   OPÇÃO B — Publicar a planilha como CSV via Google Sheets (como nas
   versões anteriores deste dashboard), que oferece um link público
   com CORS liberado e atualização automática ao abrir a página.

   O código abaixo tenta primeiro XLSX_URL (link configurado); se
   falhar, tenta XLSX_URL_FALLBACK (caminho local no repositório).
   Ajuste os valores conforme a opção escolhida.
   ================================================================== */
const XLSX_URL = "https://sdidesenvolvimentoimobilari-my.sharepoint.com/:x:/g/personal/flavio_gusman_sdiweb_com_br/IQCpfCAlIEtmQLAVMpfdIHR-Acusf4wF4SPBPHztXZMqtCw?e=e2cWDG"; // <-- link informado (ver limitação acima)
const XLSX_URL_FALLBACK = "./data/Sabara_Platz.xlsx"; // <-- OPÇÃO A: caminho relativo dentro do repositório github.com/Flaviogusman/obras

// Nomes (ou índices) das abas dentro do arquivo .xlsx que correspondem
// à Aba 01 e Aba 02 do dashboard. Por padrão usa as duas primeiras
// planilhas do arquivo, na ordem em que aparecem no workbook.
const SHEET_SELECTOR = { aba1: 0, aba2: 1 }; // índice (0-based) ou string com o nome exato da aba
/* ================================================================== */
/* ================================================================== */

// Paleta de cores usada nos gráficos (tons corporativos de BI)
const PALETTE = {
  steel:'#2A5CDB', teal:'#0EA5A0', amber:'#F0A50B', rose:'#E23A5E',
  violet:'#7C5CFC', navy:'#0F1F3D', slate:'#647089', mint:'#39C4B6'
};
const SERIES_COLORS = [PALETTE.steel, PALETTE.teal, PALETTE.amber, PALETTE.rose, PALETTE.violet, PALETTE.slate];

Chart.register(ChartDataLabels);
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.color = '#47526B';

/* ==================================================================
   MAPA DE FAIXAS DE CÉLULAS POR ABA (conforme especificação recebida)
   Linhas/colunas usam a MESMA numeração da planilha original.
   Ajuste aqui caso a estrutura da planilha mude.
   ================================================================== */
const RANGE_CONFIG = {
  aba1: {
    prazos:        { r1:2,  r2:4,   c1:'A', c2:'D' },
    fisico:        { previstoCell:['A',9], realizadoCell:['B',9], desvioDiasCell:['D',9] },
    financeiro:    { r1:12, r2:16,  c1:'A', c2:'C' },
    suprimentos:   { contratadoCell:['B',19], aContratarCell:['B',20] },
    proxContrat:   { r1:23, r2:29,  c1:'A', c2:'C' },
    efetivo:       { r1:32, r2:48,  c1:'A', c2:'B' },
    semanal:       { r1:51, r2:55,  c1:'A', c2:'E' },
    mensal:        { r1:58, r2:62,  c1:'A', c2:'AL' },
    pavimento:     { r1:65, r2:103, c1:'A', c2:'C' },
    imagens:       { r1:106,r2:199, c1:'A', c2:'N' },
  },
  aba2: {
    prazos:        { r1:2,  r2:4,   c1:'A', c2:'D' },
    fisico:        { previstoCell:['A',9], realizadoCell:['B',9], desvioDiasCell:['D',9] },
    financeiro:    { r1:12, r2:16,  c1:'A', c2:'C' },
    suprimentos:   { contratadoCell:['B',19], aContratarCell:['B',20] },
    proxContrat:   { r1:23, r2:34,  c1:'A', c2:'C' },
    efetivo:       { r1:38, r2:54,  c1:'A', c2:'B' },
    semanal:       { r1:57, r2:61,  c1:'A', c2:'E' },
    mensal:        { r1:64, r2:68,  c1:'A', c2:'AQ' },
    pavimento:     { r1:71, r2:98,  c1:'A', c2:'C' },
    imagens:       { r1:101,r2:282, c1:'A', c2:'N' },
  }
};

// Estado global da aplicação
const STATE = {
  aba1: { grid:null, raw:null, error:null },
  aba2: { grid:null, raw:null, error:null },
  activeTab: 'aba1',
  lang: 'pt',
  charts: {} // referências Chart.js ativas, por id de canvas
};

/* ==================================================================
   3) CARREGAMENTO DOS DADOS
   Lê o arquivo .xlsx binário (fetch anti-cache) e converte cada aba
   selecionada em uma "grid" (array de arrays), no mesmo formato que
   as funções de renderização já esperam — cada célula acessível por
   letra de coluna + número de linha, igual à planilha original.
   ================================================================== */
async function fetchXlsxWorkbook(url){
  const bustUrl = url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now();
  const resp = await fetch(bustUrl, {cache:'no-store'});
  if(!resp.ok) throw new Error('HTTP ' + resp.status);
  const buffer = await resp.arrayBuffer();
  if(!buffer || buffer.byteLength === 0) throw new Error('arquivo vazio');
  return XLSX.read(buffer, {type:'array', cellDates:false});
}

// Converte uma planilha (worksheet) do SheetJS em grid de strings,
// preservando o mesmo formato usado pelo parser de CSV (linha 1 =
// linha 1 da planilha, célula A1 = grid[0][0], etc.).
function worksheetToGrid(ws){
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
  return rows
    .map(r => r.map(v => (v === null || v === undefined) ? '' : String(v).trim()))
    .filter(r => r.some(c => c !== ''));
}

function pickSheet(workbook, selector){
  if(typeof selector === 'number') return workbook.Sheets[workbook.SheetNames[selector]];
  return workbook.Sheets[selector] || null;
}

async function loadWorkbookFromAnySource(){
  // 1ª tentativa: link configurado (ex.: SharePoint). 2ª tentativa: fallback local no repositório.
  const attempts = [XLSX_URL, XLSX_URL_FALLBACK].filter(u => u && !u.includes('COLE_AQUI'));
  let lastError = null;
  for(const url of attempts){
    try{
      const wb = await fetchXlsxWorkbook(url);
      return { workbook: wb, sourceUrl: url };
    } catch(e){
      lastError = e;
      console.warn('Falha ao carregar XLSX de', url, '-', e.message);
    }
  }
  throw lastError || new Error('nenhuma fonte de dados configurada');
}

function setStatus(mode, msgKey){
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot' + (mode==='loading' ? ' loading' : mode==='error' ? ' err' : '');
  txt.setAttribute('data-i18n', msgKey);
  txt.textContent = I18N[STATE.lang][msgKey];
}

async function refreshAllData(){
  setStatus('loading', 'statusLoading');
  try{
    const { workbook, sourceUrl } = await loadWorkbookFromAnySource();
    STATE.sourceUrl = sourceUrl;

    const wsAba1 = pickSheet(workbook, SHEET_SELECTOR.aba1);
    const wsAba2 = pickSheet(workbook, SHEET_SELECTOR.aba2);

    if(wsAba1){ STATE.aba1.grid = worksheetToGrid(wsAba1); STATE.aba1.error = null; }
    else { STATE.aba1.grid = null; STATE.aba1.error = 'aba 1 não encontrada no arquivo (SHEET_SELECTOR.aba1)'; }

    if(wsAba2){ STATE.aba2.grid = worksheetToGrid(wsAba2); STATE.aba2.error = null; }
    else { STATE.aba2.grid = null; STATE.aba2.error = 'aba 2 não encontrada no arquivo (SHEET_SELECTOR.aba2)'; }

    const anyErr = STATE.aba1.error || STATE.aba2.error;
    setStatus(anyErr ? 'loading' : 'ok', anyErr ? 'statusPartial' : 'statusOk');

  } catch(e){
    // Falha ao ler qualquer fonte configurada (ex.: bloqueio CORS/autenticação do SharePoint).
    STATE.aba1.grid = null; STATE.aba1.error = e.message;
    STATE.aba2.grid = null; STATE.aba2.error = e.message;
    setStatus('error', 'statusError');
  }

  document.getElementById('lastUpdateTime').textContent = new Date().toLocaleString('pt-BR');
  renderTabTitles();
  renderAllTabs();
}
function colToIndex(letters){
  let n = 0;
  for(const ch of letters.toUpperCase()){
    n = n*26 + (ch.charCodeAt(0) - 64);
  }
  return n - 1;
}

// Retorna o valor bruto (string) de uma célula, por letra de coluna + linha (1-based)
function cell(grid, colLetter, rowNum){
  const r = grid[rowNum-1];
  if(!r) return '';
  const idx = colToIndex(colLetter);
  return (r[idx] !== undefined && r[idx] !== null) ? String(r[idx]).trim() : '';
}

// Retorna uma sub-matriz [linhas][colunas] dado um intervalo A1-like
function range(grid, c1, r1, c2, r2){
  const ci1 = colToIndex(c1), ci2 = colToIndex(c2);
  const out = [];
  for(let r=r1; r<=r2; r++){
    const line = grid[r-1] || [];
    const rowOut = [];
    for(let c=ci1; c<=ci2; c++){
      rowOut.push(line[c] !== undefined ? String(line[c]).trim() : '');
    }
    out.push(rowOut);
  }
  return out;
}

/* ==================================================================
   2) UTILITÁRIOS DE NÚMEROS E DATAS (formatos BR e serial do Sheets)
   ================================================================== */
function parseNumberBR(raw){
  if(raw === null || raw === undefined) return null;
  let s = String(raw).trim();
  if(s === '') return null;
  s = s.replace(/[R$%\s]/g,'');
  const hasComma = s.includes(','), hasDot = s.includes('.');
  if(hasComma && hasDot){
    // 1.234,56 -> formato BR com separador de milhar
    s = s.replace(/\./g,'').replace(',', '.');
  } else if(hasComma){
    s = s.replace(',', '.');
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function excelSerialToDate(serial){
  // Google Sheets/Excel: dia 0 = 30/12/1899
  const utcDays = Math.floor(serial - 25569);
  const utcMs = utcDays * 86400 * 1000;
  return new Date(utcMs);
}

function parseDateFlexible(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  if(s === '') return null;
  // dd/mm/yyyy ou dd-mm-yyyy
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    let [_, d, mo, y] = m;
    if(y.length === 2) y = '20'+y;
    const dt = new Date(Number(y), Number(mo)-1, Number(d));
    return isNaN(dt.getTime()) ? null : dt;
  }
  // yyyy-mm-dd
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){
    const dt = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    return isNaN(dt.getTime()) ? null : dt;
  }
  // serial numérico do Sheets
  if(/^\d+(\.\d+)?$/.test(s) && Number(s) > 20000 && Number(s) < 60000){
    return excelSerialToDate(Number(s));
  }
  const dt = new Date(s);
  return isNaN(dt.getTime()) ? null : dt;
}

function formatDateBR(dateOrRaw){
  const dt = (dateOrRaw instanceof Date) ? dateOrRaw : parseDateFlexible(dateOrRaw);
  if(!dt) return (dateOrRaw || '—');
  const p = n => String(n).padStart(2,'0');
  return `${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;
}

function formatMonthYearBR(raw){
  const dt = parseDateFlexible(raw);
  if(dt){
    const p = n => String(n).padStart(2,'0');
    return `${p(dt.getMonth()+1)}/${dt.getFullYear()}`;
  }
  return raw || '—'; // já pode vir pronto como "jan/2026" na planilha
}

function formatCurrencyBRL(n){
  if(n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL', maximumFractionDigits:0});
}

function formatPercent(n, casas=1){
  if(n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('pt-BR', {minimumFractionDigits:casas, maximumFractionDigits:casas}) + '%';
}

// Localiza, dentro de um bloco de linhas, a linha cujo rótulo (1ª coluna
// não vazia) contém a palavra-chave informada — usado nos gráficos de
// combinação (semanal/mensal), onde as SÉRIES são LINHAS da planilha.
function findRowByLabel(block, keyword){
  const kw = keyword.toLowerCase();
  return block.find(row => (row[0]||'').toLowerCase().includes(kw)) || null;
}

/* ---------- 1) PRAZOS CONTRATUAIS (tabela com mescla aproximada) ---------- */
function renderPrazos(tabKey, grid, cfg){
  const r = cfg.prazos;
  const block = range(grid, r.c1, r.r1, r.c2, r.r2);
  document.getElementById(`${tabKey}-prazos`).innerHTML = renderMergedTable(block, {dateCols:'auto'});
}

// Constrói uma tabela HTML aproximando mesclagem de células: quando uma
// célula está vazia mas a célula da mesma coluna na linha anterior tem
// valor, ela é tratada como parte de um rowspan (comportamento típico de
// exportação CSV de células mescladas no Google Sheets).
function renderMergedTable(block, opts={}){
  if(!block.length || block.every(r=>r.every(c=>c===''))) return `<div class="empty-state" data-i18n="noData">Sem dados disponíveis para este bloco.</div>`;
  const nRows = block.length, nCols = block[0].length;
  const skip = Array.from({length:nRows},()=>Array(nCols).fill(false));
  const rowspan = Array.from({length:nRows},()=>Array(nCols).fill(1));

  for(let c=0;c<nCols;c++){
    for(let r=0;r<nRows;r++){
      if(skip[r][c]) continue;
      if(block[r][c] === '') continue;
      let span = 1;
      for(let r2=r+1;r2<nRows;r2++){
        if(block[r2][c] === ''){ skip[r2][c]=true; span++; } else break;
      }
      rowspan[r][c] = span;
    }
  }

  let html = '<div class="table-wrap"><table class="data-table"><tbody>';
  for(let r=0;r<nRows;r++){
    html += '<tr>';
    for(let c=0;c<nCols;c++){
      if(skip[r][c]) continue;
      let val = block[r][c];
      const looksDate = /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(val) || (opts.dateCols==='auto' && /^\d{5}$/.test(val));
      if(looksDate) val = formatDateBR(val);
      const rs = rowspan[r][c] > 1 ? ` rowspan="${rowspan[r][c]}"` : '';
      const cls = c===0 ? ' class="merged-label"' : '';
      html += `<td${rs}${cls}>${val || '—'}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

function renderFisico(tabKey, grid, cfg){
  const previsto  = parseNumberBR(cell(grid, cfg.fisico.previstoCell[0], cfg.fisico.previstoCell[1]));
  const realizado = parseNumberBR(cell(grid, cfg.fisico.realizadoCell[0], cfg.fisico.realizadoCell[1]));
  const desvioDias= parseNumberBR(cell(grid, cfg.fisico.desvioDiasCell[0], cfg.fisico.desvioDiasCell[1]));
  const desvioPct = (previsto!==null && realizado!==null) ? (realizado - previsto) : null;

  const host = document.getElementById(`${tabKey}-fisico`);
  host.innerHTML = `
    <div class="card span-4"><p class="card-title" data-i18n="fisicoPrevisto">Previsto</p><div class="chart-box h-220"><canvas id="${tabKey}-donutPrevisto"></canvas></div></div>
    <div class="card span-4"><p class="card-title" data-i18n="fisicoRealizado">Realizado</p><div class="chart-box h-220"><canvas id="${tabKey}-donutRealizado"></canvas></div></div>
    <div class="kpi span-2">
      <span class="kpi-label" data-i18n="fisicoDesvioPct">Desvio (%)</span>
      <span class="kpi-value ${desvioPct>=0?'pos':'neg'}">${desvioPct!==null?(desvioPct>=0?'+':'')+formatPercent(desvioPct):'—'}</span>
      <span class="kpi-sub" data-i18n="fisicoDesvioPctSub">Realizado − Previsto</span>
    </div>
    <div class="kpi span-2">
      <span class="kpi-label" data-i18n="fisicoDesvioDias">Desvio (dias)</span>
      <span class="kpi-value ${desvioDias>=0?'pos':'neg'}">${desvioDias!==null?desvioDias:'—'}</span>
      <span class="kpi-sub" data-i18n="fisicoDesvioDiasSub">Base: célula de controle da planilha</span>
    </div>`;

  buildDonut(`${tabKey}-donutPrevisto`, previsto, PALETTE.steel);
  buildDonut(`${tabKey}-donutRealizado`, realizado, PALETTE.teal);
}

function buildDonut(canvasId, value, color){
  destroyChart(canvasId);
  const v = value===null ? 0 : Math.max(0, Math.min(100, value));
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  STATE.charts[canvasId] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:['Concluído','Restante'], datasets:[{ data:[v, 100-v], backgroundColor:[color, '#E9EDF5'], borderWidth:0, cutout:'74%' }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{enabled:true},
        datalabels:{
          display: (ctxD) => ctxD.dataIndex===0,
          color: '#0F1F3D', font:{weight:800, size:22, family:"Manrope"},
          formatter:() => (value===null?'—':formatPercent(v,0))
        }
      }
    }
  });
}

function renderFinanceiro(tabKey, grid, cfg){
  const r = cfg.financeiro;
  const block = range(grid, r.c1, r.r1, r.c2, r.r2).filter(row => row[0] !== '');
  const labels = block.map(row => row[0]);
  const values = block.map(row => parseNumberBR(row[1]));
  const pmg = values[0] || null; // referência para % quando a coluna C não traz percentual pronto
  const pctFromSheet = block.map(row => parseNumberBR(row[2]));

  destroyChart(`${tabKey}-chartFinanceiro`);
  const ctx = document.getElementById(`${tabKey}-chartFinanceiro`);
  if(!ctx) return;
  STATE.charts[`${tabKey}-chartFinanceiro`] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data: values, backgroundColor: SERIES_COLORS, borderRadius:6, barThickness:34 }] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales:{ x:{ grid:{color:'#EEF1F7'}, ticks:{callback:v=>formatCurrencyBRL(v)} }, y:{ grid:{display:false} } },
      plugins:{
        legend:{display:false},
        datalabels:{
          anchor:'end', align:'end', color:'#0F1F3D', font:{weight:700, size:12},
          formatter:(val, ctxD) => {
            const idx = ctxD.dataIndex;
            const pct = pctFromSheet[idx]!==null ? pctFromSheet[idx] : (pmg && idx>0 ? (val/pmg*100) : null);
            const pctStr = (idx>0 && pct!==null) ? ` (${formatPercent(pct,0)})` : '';
            return formatCurrencyBRL(val) + pctStr;
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* ---------- 7 e 8) GRÁFICOS DE COMBINAÇÃO (semanal / mensal) ----------
   Estrutura de origem: a 1ª linha do bloco traz os rótulos do eixo X
   (datas ou meses); as linhas seguintes são as SÉRIES, identificadas
   pelo texto da 1ª coluna (ex.: "SEMANAL PREVISTO", "ACUMULADO REALIZADO"). */
function renderCombo(tabKey, grid, blockCfg, kindLabel, canvasKey, primaryScale, secondaryScale, isMonthly){
  const block = range(grid, blockCfg.c1, blockCfg.r1, blockCfg.c2, blockCfg.r2);
  const headerRow = block[0];
  const xLabels = headerRow.slice(1).map(v => isMonthly ? formatMonthYearBR(v) : formatDateBR(v));

  const rows = block.slice(1);
  const semPrev  = findRowByLabel(rows, isMonthly ? 'mensal previsto'  : 'semanal previsto');
  const semReal  = findRowByLabel(rows, isMonthly ? 'mensal realizado' : 'semanal realizado');
  const acPrev   = findRowByLabel(rows, 'acumulado previsto');
  const acReal   = findRowByLabel(rows, 'acumulado realizado');

  const toNums = row => row ? row.slice(1).map(parseNumberBR) : [];

  destroyChart(`${tabKey}-${canvasKey}`);
  const ctx = document.getElementById(`${tabKey}-${canvasKey}`);
  if(!ctx) return;

  STATE.charts[`${tabKey}-${canvasKey}`] = new Chart(ctx, {
    data:{
      labels: xLabels,
      datasets:[
        { type:'bar', label: isMonthly?'Mensal Previsto':'Semanal Previsto', data: toNums(semPrev), backgroundColor:PALETTE.steel+'CC', yAxisID:'y1', borderRadius:4 },
        { type:'bar', label: isMonthly?'Mensal Realizado':'Semanal Realizado', data: toNums(semReal), backgroundColor:PALETTE.teal+'CC', yAxisID:'y1', borderRadius:4 },
        { type:'line', label:'Acumulado Previsto', data: toNums(acPrev), borderColor:PALETTE.amber, backgroundColor:PALETTE.amber, yAxisID:'y', tension:.3, borderWidth:2.5, pointRadius:3 },
        { type:'line', label:'Acumulado Realizado', data: toNums(acReal), borderColor:PALETTE.rose, backgroundColor:PALETTE.rose, yAxisID:'y', tension:.3, borderWidth:2.5, pointRadius:3 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      scales:{
        y:{ position:'left', min:primaryScale.min, max:primaryScale.max, ticks:{ stepSize:primaryScale.step }, grid:{color:'#EEF1F7'}, title:{display:true,text:'% Acumulado'} },
        y1:{ position:'right', min:secondaryScale.min, max:secondaryScale.max, ticks:{ stepSize:secondaryScale.step }, grid:{display:false}, title:{display:true,text:'% Período'} },
      },
      plugins:{ legend:{ position:'bottom', labels:{usePointStyle:true, boxWidth:8, font:{weight:600}} }, datalabels:{display:false} }
    }
  });
}

/* ---------- 9) EVOLUÇÃO POR PAVIMENTO (barras horizontais) ---------- */
function renderPavimento(tabKey, grid, cfg){
  const r = cfg.pavimento;
  const block = range(grid, r.c1, r.r1, r.c2, r.r2).filter(row => row[0] !== '');
  const labels = block.map(row => row[0]);
  // assume última coluna preenchida da linha como % Realizado
  const values = block.map(row => {
    const lastFilled = [...row].reverse().find(v => v !== '');
    return parseNumberBR(lastFilled);
  });

  // altura dinâmica: garante barras largas e legíveis mesmo com muitos pavimentos
  const rowHeight = 34;
  document.getElementById(`${tabKey}-pavimentoBox`).style.height = Math.max(360, labels.length * rowHeight) + 'px';

  destroyChart(`${tabKey}-chartPavimento`);
  const ctx = document.getElementById(`${tabKey}-chartPavimento`);
  if(!ctx) return;
  STATE.charts[`${tabKey}-chartPavimento`] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:PALETTE.steel, borderRadius:5, barPercentage:.7, categoryPercentage:.85 }] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales:{ x:{ min:0, max:100, grid:{color:'#EEF1F7'}, ticks:{callback:v=>v+'%'} }, y:{ grid:{display:false}, ticks:{ font:{weight:800, size:12}, color:'#0F1F3D' } } },
      plugins:{
        legend:{display:false},
        datalabels:{ anchor:'center', align:'center', color:'#fff', font:{weight:800, size:12}, formatter:v=> v!==null? formatPercent(v,0):'' }
      }
    }
  });
}

/* ---------- 10) REGISTRO FOTOGRÁFICO — limitação técnica do CSV ---------- */
function renderImagensNotice(tabKey){
  document.getElementById(`${tabKey}-imagens`).innerHTML = `
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div data-i18n="imgNotice">
        A leitura via SheetJS extrai texto e números das células, mas não as imagens flutuantes inseridas sobre a planilha (fotos coladas não ficam vinculadas a uma célula específica).
        Por isso esta seção não pode exibir automaticamente o registro fotográfico da planilha.
        Alternativas: (1) inserir os links diretos das fotos (Google Drive, Imgur, SharePoint com link público) em uma coluna de texto para o dashboard exibi-los, ou (2) manter o registro fotográfico como anexo separado no repositório.
      </div>
    </div>`;
}

/* ---------- EXPLORADOR DE DADOS (filtro dinâmico por coluna) ---------- */
function populateExplorerColumns(tabKey, grid){
  const header = grid[0] || [];
  const select = document.getElementById(`${tabKey}-explCol`);
  if(!select) return;
  select.innerHTML = header.map((h,i) => `<option value="${i}">${h ? h : 'Coluna ' + String.fromCharCode(65+i)}</option>`).join('');
}

function renderExplorer(tabKey){
  const grid = STATE[tabKey].grid;
  if(!grid) return;
  const type = document.getElementById(`${tabKey}-explType`).value;
  const colIdx = Number(document.getElementById(`${tabKey}-explCol`).value);
  const rows = grid.slice(1).filter(r => r[0] !== '' && r[colIdx] !== undefined && r[colIdx] !== '');
  const labels = rows.map(r => r[0]);
  const values = rows.map(r => parseNumberBR(r[colIdx]));

  destroyChart(`${tabKey}-chartExplorer`);
  const ctx = document.getElementById(`${tabKey}-chartExplorer`);
  if(!ctx) return;
  STATE.charts[`${tabKey}-chartExplorer`] = new Chart(ctx, {
    type: type === 'doughnut' ? 'doughnut' : type,
    data:{
      labels,
      datasets:[{
        label: grid[0][colIdx] || 'Valor',
        data: values,
        backgroundColor: type==='doughnut' ? SERIES_COLORS : PALETTE.violet,
        borderColor: type==='line' ? PALETTE.violet : undefined,
        borderRadius: type==='bar' ? 6 : undefined,
        tension:.3
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:type==='doughnut', position:'bottom' } } }
  });
}

/* ==================================================================
   5) EXPORTAÇÃO EM PDF (captura o dashboard renderizado)
   ================================================================== */
async function exportPdf(){
  const { jsPDF } = window.jspdf;
  const target = document.getElementById('appRoot');
  const btnPdf = document.getElementById('btnPdf');
  btnPdf.disabled = true;
  try{
    const canvas = await html2canvas(target, { scale:1.5, backgroundColor:'#F4F6F9', useCORS:true });
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const pdf = new jsPDF('p', 'pt', 'a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = canvas.height * (imgW / canvas.width);
    let heightLeft = imgH, position = 0;
    pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
    heightLeft -= pageH;
    while(heightLeft > 0){
      position = heightLeft - imgH;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
      heightLeft -= pageH;
    }
    pdf.save('dashboard-obras.pdf');
  } catch(e){
    alert('Não foi possível gerar o PDF: ' + e.message);
  } finally {
    btnPdf.disabled = false;
  }
}

function toggleLanguage(){
  STATE.lang = STATE.lang === 'pt' ? 'en' : 'pt';
  document.getElementById('btnLang').textContent = STATE.lang === 'pt' ? 'EN' : 'PT';
  document.documentElement.lang = STATE.lang === 'pt' ? 'pt-BR' : 'en';
  applyTranslations();
}

function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(I18N[STATE.lang][key]) el.textContent = I18N[STATE.lang][key];
  });

}
